services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${APP_VERSION:-0.1.0}
        COMMIT: ${COMMIT:-dev}
        BUILT_AT: ${BUILT_AT:-unknown}
    image: allinme.core-api:${APP_VERSION:-0.1.0}
    container_name: allinme-core-api
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      APP_NAME: ${APP_NAME:-allinme.core-api}
      APP_ENV: ${APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      HTTP_ADDR: ":8080"
      HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-5s}
      HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-10s}
      HTTP_IDLE_TIMEOUT: ${HTTP_IDLE_TIMEOUT:-60s}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Optional: load local overrides without committing secrets
    # env_file:
    #   - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
