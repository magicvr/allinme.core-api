name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout core API
        uses: actions/checkout@v4

      - name: Checkout protocol fixtures
        uses: actions/checkout@v4
        with:
          repository: magicvr/schema-ui-docs
          ref: 152501fb1b8cade02f2780d96a82b5ceb2f5d281
          path: schema-ui-docs

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        env:
          SCHEMA_UI_FIXTURES: ${{ github.workspace }}/schema-ui-docs/conformance/fixtures
        run: go test ./...

      - name: Vet
        run: go vet ./...