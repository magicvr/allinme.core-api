name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: allinme.core-api

    steps:
      - name: Checkout core API
        uses: actions/checkout@v5
        with:
          path: allinme.core-api
          fetch-depth: 0

      - name: Checkout protocol fixtures
        uses: actions/checkout@v5
        with:
          repository: magicvr/schema-ui-docs
          ref: d2f0fc0877dc6550c9fe7e3635b25c7ec72b4ddd
          path: schema-ui-docs

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: allinme.core-api/go.mod
          cache: true
          cache-dependency-path: allinme.core-api/go.sum

      - name: Test
        env:
          SCHEMA_UI_FIXTURES: ${{ github.workspace }}/schema-ui-docs/conformance/fixtures
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Validate documentation
        shell: pwsh
        env:
          AUDIT_HISTORY_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: ./docs/tools/validate.ps1

      - name: Test documentation validator
        shell: pwsh
        run: ./docs/tools/validate.tests.ps1

  race:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: allinme.core-api

    steps:
      - name: Checkout core API
        uses: actions/checkout@v5
        with:
          path: allinme.core-api

      - name: Checkout protocol fixtures
        uses: actions/checkout@v5
        with:
          repository: magicvr/schema-ui-docs
          ref: d2f0fc0877dc6550c9fe7e3635b25c7ec72b4ddd
          path: schema-ui-docs

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: allinme.core-api/go.mod
          cache: true
          cache-dependency-path: allinme.core-api/go.sum

      - name: Race test
        env:
          SCHEMA_UI_FIXTURES: ${{ github.workspace }}/schema-ui-docs/conformance/fixtures
        run: go test -race ./... -count=1
