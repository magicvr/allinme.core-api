name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout core API
        uses: actions/checkout@v4

      - name: Checkout protocol fixtures
        uses: actions/checkout@v4
        with:
          repository: magicvr/schema-ui-docs
          ref: d2f0fc0877dc6550c9fe7e3635b25c7ec72b4ddd
          path: schema-ui-docs

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        env:
          SCHEMA_UI_FIXTURES: ${{ github.workspace }}/schema-ui-docs/conformance/fixtures
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Validate documentation
        shell: pwsh
        run: ./docs/audit/validate.ps1

      - name: Test documentation validator
        shell: pwsh
        run: ./docs/audit/validate.tests.ps1

  race:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout core API
        uses: actions/checkout@v4

      - name: Checkout protocol fixtures
        uses: actions/checkout@v4
        with:
          repository: magicvr/schema-ui-docs
          ref: d2f0fc0877dc6550c9fe7e3635b25c7ec72b4ddd
          path: schema-ui-docs

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Race test
        env:
          SCHEMA_UI_FIXTURES: ${{ github.workspace }}/schema-ui-docs/conformance/fixtures
        run: go test -race ./... -count=1